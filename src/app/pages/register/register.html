<div class="register-container">
  <div class="register-card">
    <div class="register-logo">
      <img src="LogoGamerdiary.png" alt="GamerDiary" />
    </div>
    <h2>Crear Cuenta</h2>
    <p class="subtitle">Únete a GamerDiary</p>

    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="nombre" name="nombre" placeholder="Tu nombre" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Mínimo 6 caracteres" required />
      </div>
      <button type="submit" class="btn-register">Registrarse</button>
    </form>

    <p class="login-link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </div>
</div>
