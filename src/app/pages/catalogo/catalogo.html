<div class="catalogo-container">
  <div class="catalogo-header">
    <h1>Catálogo de Servicios</h1>
    <p>Elige el setup gamer perfecto para ti</p>
  </div>

  <div class="servicios-grid" *ngIf="loading">
    <div class="skeleton-card" *ngFor="let i of [1,2,3,4]">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton skeleton-line short"></div>
      <div class="skeleton skeleton-line medium"></div>
      <div class="skeleton skeleton-line long"></div>
    </div>
  </div>

  <div class="servicios-grid" *ngIf="!loading">
    <div class="servicio-card" *ngFor="let servicio of servicios">
      <img *ngIf="servicio.imagen_url" [src]="servicio.imagen_url" [alt]="servicio.nombre_servicio" />
      <div class="card-body">
        <span class="categoria">{{ servicio.categoria }}</span>
        <h3>{{ servicio.nombre_servicio }}</h3>
        <p>{{ servicio.descripcion }}</p>
        <div class="card-footer">
          <span class="precio">{{ servicio.precio | currency:'EUR' }}</span>
          <a routerLink="/citas" class="btn-reservar">Reservar</a>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && servicios.length === 0" class="empty">
    No hay servicios disponibles aún.
  </div>
</div>
